<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servidor FTP Web Simple</title>
    <script src="/libs/tailwind.js"></script>
</head>
<body class="min-h-screen overflow-x-hidden bg-slate-950 text-slate-100 antialiased">
    <canvas id="neuron-canvas" class="fixed inset-0 -z-10 h-full w-full"></canvas>
    <div class="relative mx-auto flex min-h-screen w-full max-w-7xl flex-col px-4 py-6 sm:px-6 lg:px-8">
        <div class="absolute inset-x-0 top-0 -z-10 h-72 bg-gradient-to-b from-sky-500/20 via-cyan-500/10 to-transparent blur-3xl"></div>
        <div class="absolute -left-24 top-20 -z-10 h-64 w-64 rounded-full bg-sky-500/10 blur-3xl"></div>
        <div class="absolute -right-24 top-40 -z-10 h-64 w-64 rounded-full bg-cyan-500/10 blur-3xl"></div>

        <div class="rounded-[28px] border border-white/10 bg-slate-900/70 p-5 shadow-2xl shadow-slate-950/60 backdrop-blur-xl sm:p-8">
            <header class="flex flex-col gap-4 border-b border-white/10 pb-5 lg:flex-row lg:items-center lg:justify-between">
                <div class="space-y-2">
                    <p class="text-xs font-semibold uppercase tracking-[0.35em] text-sky-300/80">MPTB vShell</p>
                    <div class="flex flex-wrap items-center gap-3">
                        <h1 class="text-3xl font-black tracking-tight text-white sm:text-4xl">📂 Archivos Web FTP</h1>
                        <span id="ffmpeg-indicator" class="inline-flex items-center rounded-full border border-slate-700 bg-slate-800 px-3 py-1 text-xs font-semibold text-slate-300 shadow-lg shadow-slate-950/30">FFmpeg: ...</span>
                    </div>
                </div>

                <div class="flex flex-wrap items-center gap-3">
                    {% if username %}
                        <span class="rounded-full border border-sky-500/30 bg-sky-500/10 px-4 py-2 text-sm font-semibold text-sky-200">{{ username }}</span>
                        <a href="/logout" class="inline-flex items-center justify-center rounded-full border border-rose-500/30 bg-rose-500/10 px-4 py-2 text-sm font-semibold text-rose-200 transition hover:bg-rose-500/20 hover:text-white">Salir</a>
                    {% endif %}
                </div>
            </header>

            <div id="flash-messages" class="mt-5 space-y-3"></div>

            <div id="breadcrumb" class="mt-5 rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-slate-300">
                <!-- Breadcrumb will be loaded here -->
            </div>

            <div class="mt-5 grid gap-4 xl:grid-cols-2">
                <section class="rounded-2xl border border-white/10 bg-white/5 p-4 shadow-lg shadow-slate-950/20">
                    <h3 class="text-sm font-semibold uppercase tracking-[0.2em] text-slate-300">Subir Archivo</h3>
                    <form id="uploadForm" class="mt-4 flex flex-col gap-3 sm:flex-row sm:items-center">
                        <input type="file" name="file" required class="block w-full cursor-pointer rounded-xl border border-dashed border-slate-700 bg-slate-950/60 px-3 py-2 text-sm text-slate-300 file:mr-4 file:rounded-lg file:border-0 file:bg-sky-500 file:px-4 file:py-2 file:text-sm file:font-semibold file:text-white hover:border-sky-500/50 hover:bg-slate-950 focus:outline-none focus:ring-2 focus:ring-sky-500/40">
                        <button type="submit" class="inline-flex items-center justify-center rounded-xl bg-sky-500 px-4 py-2.5 text-sm font-semibold text-white shadow-lg shadow-sky-500/25 transition hover:bg-sky-400 focus:outline-none focus:ring-2 focus:ring-sky-400/60">Subir</button>
                    </form>
                </section>

                <section class="rounded-2xl border border-white/10 bg-white/5 p-4 shadow-lg shadow-slate-950/20">
                    <h3 class="text-sm font-semibold uppercase tracking-[0.2em] text-slate-300">Crear Carpeta</h3>
                    <form id="createFolderForm" class="mt-4 flex flex-col gap-3 sm:flex-row sm:items-center">
                        <input type="text" name="folder_name" placeholder="Nombre de carpeta" required class="w-full rounded-xl border border-slate-700 bg-slate-950/60 px-4 py-2.5 text-sm text-slate-100 placeholder:text-slate-500 focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-500/40">
                        <button type="submit" class="inline-flex items-center justify-center rounded-xl border border-slate-700 bg-slate-800 px-4 py-2.5 text-sm font-semibold text-slate-100 transition hover:border-sky-500/50 hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-sky-400/60">Crear</button>
                    </form>
                </section>
            </div>

            <ul id="fileList" class="mt-5 divide-y divide-slate-800 overflow-hidden rounded-2xl border border-white/10 bg-slate-950/50 shadow-lg shadow-slate-950/20">
                <!-- Files will be loaded here -->
            </ul>
            
            <section class="mt-5 rounded-2xl border border-sky-500/20 bg-slate-950/70 p-5 shadow-xl shadow-sky-950/20">
                <h3 class="mt-0 text-sm font-semibold uppercase tracking-[0.24em] text-sky-300">🚀 Estado de Conversión</h3>
                <div class="mt-4 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                    <span class="text-sm text-slate-300">Procesando: <strong id="currentFileText" class="font-semibold text-white">-</strong></span>
                    <span class="text-sm text-slate-300">Completado: <strong id="percentText" class="font-semibold text-sky-300">0%</strong></span>
                </div>
                <div class="mt-1 flex justify-end text-xs text-slate-400">
                    <span class="font-mono"><span id="part">0</span> / <span id="total">0</span></span>
                </div>
                
                <div class="progressBar mt-3 h-3 w-full overflow-hidden rounded-full bg-white/10 shadow-inner shadow-black/30">
                    <div class="progress h-full rounded-full bg-sky-400 shadow-[0_0_16px_rgba(56,189,248,0.65)] transition-[width] duration-300 ease-out" style="width: 0%;"></div>
                </div>
                
                <div class="mt-5 border-t border-white/10 pt-4">
                    <h4 class="mb-3 text-sm font-semibold uppercase tracking-[0.2em] text-slate-300">⏳ Cola de Espera</h4>
                    <div id="queueList" class="max-h-28 overflow-y-auto text-sm text-slate-400">
                        <div class="italic">Cola vacía</div>
                    </div>
                </div>

                <div class="mt-3 hidden text-right text-xs text-slate-500">
                    <span>Terminado: <span id="okVal">NO</span></span>
                </div>
            </section>
        </div>
    </div>

    <script src="/static/ffmpeg.js"></script>
    <script src="/static/neuron.js"></script>
</body>
</html>
