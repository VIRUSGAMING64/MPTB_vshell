<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MPTB shell</title>
    <script src="/libs/tailwind.js"></script>
</head>
<body class="min-h-screen overflow-hidden bg-slate-950 text-slate-100 antialiased">
    <canvas id="neuron-canvas" class="fixed inset-0 -z-10 h-full w-full"></canvas>
    <div class="relative flex min-h-screen items-center justify-center px-4 py-10">
        <div class="absolute inset-0 -z-10 bg-[radial-gradient(circle_at_top,_rgba(14,165,233,0.18),_transparent_40%),radial-gradient(circle_at_bottom_right,_rgba(34,211,238,0.12),_transparent_35%)]"></div>
        <div class="w-full max-w-md rounded-[28px] border border-white/10 bg-slate-900/80 p-8 shadow-2xl shadow-slate-950/60 backdrop-blur-xl">
        <div class="mb-8 text-center">
            <p class="text-xs font-semibold uppercase tracking-[0.35em] text-sky-300/80">Acceso privado</p>
            <h2 class="mt-3 text-3xl font-black tracking-tight text-white">Iniciar Sesión</h2>
        </div>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="mb-6 space-y-3">
                    {% for message in messages %}
                        <p class="rounded-xl border border-rose-500/40 bg-rose-500/15 px-4 py-3 text-sm text-rose-100">{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        <form method="POST" class="space-y-4">
            <div class="space-y-2">
                <label for="username" class="text-sm font-medium text-slate-300">Usuario</label>
                <input type="text" id="username" name="username" required class="w-full rounded-xl border border-slate-700 bg-slate-950/70 px-4 py-3 text-slate-100 placeholder:text-slate-500 focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-500/40">
            </div>
            <div class="space-y-2">
                <label for="password" class="text-sm font-medium text-slate-300">Contraseña (ID)</label>
                <input type="password" id="password" name="password" required class="w-full rounded-xl border border-slate-700 bg-slate-950/70 px-4 py-3 text-slate-100 placeholder:text-slate-500 focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-500/40">
            </div>
            <button type="submit" class="inline-flex w-full items-center justify-center rounded-xl bg-sky-500 px-4 py-3 text-sm font-semibold text-white shadow-lg shadow-sky-500/25 transition hover:bg-sky-400 focus:outline-none focus:ring-2 focus:ring-sky-400/60">Entrar</button>
        </form>
        </div>
    </div>
    <script src="/static/neuron.js"></script>
</body>
</html>
